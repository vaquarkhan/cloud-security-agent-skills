name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install -e ".[bastion]" || pip install "mcp-bastion-python[policy]>=1.0.12"

      - name: Unit tests
        run: pytest tests/unit/ -v

  bastion-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bastion
        run: pip install "mcp-bastion-python[policy]>=1.0.12"

      - name: Validate bastion.yaml
        run: mcp-bastion validate --config bastion.yaml

  mcp-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,bastion]"
          python -m spacy download en_core_web_sm
          python -c "from mcp_bastion.pillars.pii_redaction import PIIRedactor; PIIRedactor().redact_text('warmup')"

      - name: MCP protocol tests
        run: |
          mcp-test --transport stdio \
            --server-command "python -m agent.mcp_server" \
            -k protocol

      - name: Security suite (Bastion adversarial + PII)
        run: |
          mcp-test-harness stdio --suite security -- python -m agent.mcp_server

  aiv-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download AIV CLI (io.github.vaquarkhan:aiv-gate)
        run: |
          curl -fsSL -o aiv-cli.jar \
            "https://repo1.maven.org/maven2/io/github/vaquarkhan/aiv/aiv-cli/1.0.4/aiv-cli-1.0.4.jar"

      - name: Run AIV integrity gate
        id: aiv
        run: |
          set -o pipefail
          java -jar aiv-cli.jar \
            --workspace "${{ github.workspace }}" \
            --diff "origin/${{ github.base_ref }}" \
            --output-json aiv-report.json 2>&1 | tee aiv-report.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post AIV report to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportPath = path.join(process.env.GITHUB_WORKSPACE, 'aiv-report.txt');
            let raw = fs.existsSync(reportPath) ? fs.readFileSync(reportPath, 'utf8') : 'Report not available.';
            const overallMatch = raw.match(/Overall:\s*(PASS|FAIL)/i);
            const overall = overallMatch ? overallMatch[1].toUpperCase() : 'UNKNOWN';
            const body = `## AIV Report\n\n**Status:** ${overall}\n\n<details><summary>Full report</summary>\n\n\`\`\`\n${raw}\n\`\`\`\n</details>`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });

      - name: Fail if AIV gate failed
        run: |
          if [ "${{ steps.aiv.outputs.exitcode }}" != "0" ]; then
            exit 1
          fi
